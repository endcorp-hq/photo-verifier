AWSTemplateFormatVersion: '2010-09-09'
Description: Presign API - HTTP API Gateway + Lambda that returns presigned S3 PUT URLs

Parameters:
  BucketName:
    Type: String
    Description: Target S3 bucket name (e.g., photoverifier)
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: CORS allowed origin for API responses
  UrlExpirySeconds:
    Type: Number
    Default: 300
    Description: Presigned URL expiration in seconds
  BucketRegion:
    Type: String
    Default: us-east-1
    Description: AWS region where the target S3 bucket exists
  AttestationPrivateKeyBase58:
    Type: String
    NoEcho: true
    Description: Base58-encoded 32-byte Ed25519 seed (or 64-byte Solana secret key) used to sign on-chain attestations
  AttestationPublicKey:
    Type: String
    Default: Ga6SxqKLPTzrc4pykqrawSi9pvz3ZGhAdnZSBDKKioYk
    Description: Base58 Ed25519 public key corresponding to AttestationPrivateKeyBase58

Resources:
  PresignFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3PutObjectPresign
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${BucketName}/*

  PresignFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt PresignFunctionRole.Arn
      Timeout: 10
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          BUCKET_REGION: !Ref BucketRegion
          URL_EXPIRY_SECONDS: !Ref UrlExpirySeconds
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          SOLANA_RPC_URL: https://api.devnet.solana.com
          ATTESTATION_PRIVATE_KEY_B58: !Ref AttestationPrivateKeyBase58
          ATTESTATION_PUBLIC_KEY: !Ref AttestationPublicKey
      Code:
        ZipFile: |
          const crypto = require('crypto');

          const BUCKET = process.env.BUCKET_NAME;
          const EXPIRES = Number(process.env.URL_EXPIRY_SECONDS || 300);
          const ALLOWED_ORIGIN = process.env.ALLOWED_ORIGIN || '*';
          const BUCKET_REGION = process.env.BUCKET_REGION || 'us-east-1';
          const SOLANA_RPC_URL = process.env.SOLANA_RPC_URL || 'https://api.devnet.solana.com';
          const ATTESTATION_PRIVATE_KEY_B58 = process.env.ATTESTATION_PRIVATE_KEY_B58 || '';
          const ATTESTATION_PUBLIC_KEY = process.env.ATTESTATION_PUBLIC_KEY || 'Ga6SxqKLPTzrc4pykqrawSi9pvz3ZGhAdnZSBDKKioYk';
          const U64_MAX = (1n << 64n) - 1n;
          const NONCE_TTL_MS = 10 * 60 * 1000;
          const nonceCache = new Map();
          const BASE58_ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';

          function response(status, body) {
            return {
              statusCode: status,
              headers: {
                'Content-Type': 'application/json',
                'Access-Control-Allow-Origin': ALLOWED_ORIGIN,
                'Access-Control-Allow-Headers': '*',
                'Access-Control-Allow-Methods': 'POST,OPTIONS',
              },
              body: JSON.stringify(body),
            };
          }

          function decodeBase58(value) {
            if (typeof value !== 'string' || value.length === 0) {
              throw new Error('Invalid base58 value');
            }
            const bytes = [0];
            for (const ch of value) {
              const idx = BASE58_ALPHABET.indexOf(ch);
              if (idx < 0) throw new Error('Invalid base58 character');
              let carry = idx;
              for (let i = 0; i < bytes.length; i++) {
                const x = bytes[i] * 58 + carry;
                bytes[i] = x & 0xff;
                carry = x >> 8;
              }
              while (carry > 0) {
                bytes.push(carry & 0xff);
                carry >>= 8;
              }
            }
            for (const ch of value) {
              if (ch === '1') bytes.push(0);
              else break;
            }
            bytes.reverse();
            return Buffer.from(bytes);
          }

          function canonicalizeIntegrityPayload(payload) {
            return JSON.stringify({
              hashHex: payload.hashHex,
              h3Cell: payload.h3Cell,
              h3Resolution: payload.h3Resolution,
              timestampSec: payload.timestampSec,
              wallet: payload.wallet,
              nonce: payload.nonce,
              slot: payload.slot,
              blockhash: payload.blockhash,
            });
          }

          function hashFromKey(key) {
            const file = String(key).split('/').pop() || '';
            return (file.split('.')[0] || '').toLowerCase();
          }

          function parseAndValidateH3Cell(cell) {
            const normalized = String(cell || '').trim().toLowerCase().replace(/^0x/, '');
            if (!/^[0-9a-f]{1,16}$/.test(normalized)) throw new Error('Invalid integrity h3Cell');
            const value = BigInt(`0x${normalized}`);
            if (value <= 0n || value > U64_MAX) throw new Error('h3Cell out of range for u64');
            return { normalized, value };
          }

          function parseIntField(name, value) {
            const asNumber = Number(value);
            if (!Number.isInteger(asNumber)) throw new Error(`Invalid ${name}`);
            return asNumber;
          }

          function parseOptionalResolution(value) {
            if (value === undefined || value === null || value === '') return undefined;
            const resolution = parseIntField('h3Resolution', value);
            if (resolution < 0 || resolution > 15) throw new Error('h3Resolution out of range');
            return resolution;
          }

          function parseNonceU64(value) {
            let nonce;
            try {
              nonce = BigInt(String(value));
            } catch {
              throw new Error('Invalid nonce');
            }
            if (nonce < 0n || nonce > U64_MAX) throw new Error('Nonce out of range for u64');
            return nonce;
          }

          function sha256Hex(data) {
            return crypto.createHash('sha256').update(data).digest('hex');
          }

          function hmac(key, data) {
            return crypto.createHmac('sha256', key).update(data).digest();
          }

          function encodeRfc3986(value) {
            return encodeURIComponent(value).replace(/[!'()*]/g, ch =>
              '%' + ch.charCodeAt(0).toString(16).toUpperCase()
            );
          }

          function formatAmzDate(date) {
            const iso = date.toISOString().replace(/[:-]|\.\d{3}/g, '');
            return iso.slice(0, 15) + 'Z';
          }

          function getSignatureKey(secretAccessKey, dateStamp, region, service) {
            const kDate = hmac(Buffer.from('AWS4' + secretAccessKey, 'utf8'), dateStamp);
            const kRegion = hmac(kDate, region);
            const kService = hmac(kRegion, service);
            return hmac(kService, 'aws4_request');
          }

          function buildPresignedPutUrl(key, expiresSeconds) {
            const accessKeyId = process.env.AWS_ACCESS_KEY_ID;
            const secretAccessKey = process.env.AWS_SECRET_ACCESS_KEY;
            const sessionToken = process.env.AWS_SESSION_TOKEN;
            if (!accessKeyId || !secretAccessKey) {
              throw new Error('Missing AWS credentials in Lambda environment');
            }

            const now = new Date();
            const amzDate = formatAmzDate(now);
            const dateStamp = amzDate.slice(0, 8);
            const service = 's3';
            const region = BUCKET_REGION;
            const host = region === 'us-east-1' ? 's3.amazonaws.com' : `s3.${region}.amazonaws.com`;
            const credentialScope = `${dateStamp}/${region}/${service}/aws4_request`;
            const canonicalUri =
              `/${encodeRfc3986(BUCKET)}/` + String(key).split('/').map(encodeRfc3986).join('/');
            const queryParams = {
              'X-Amz-Algorithm': 'AWS4-HMAC-SHA256',
              'X-Amz-Credential': `${accessKeyId}/${credentialScope}`,
              'X-Amz-Date': amzDate,
              'X-Amz-Expires': String(expiresSeconds),
              'X-Amz-SignedHeaders': 'host',
            };
            if (sessionToken) {
              queryParams['X-Amz-Security-Token'] = sessionToken;
            }

            const canonicalQuery = Object.keys(queryParams)
              .sort()
              .map(k => `${encodeRfc3986(k)}=${encodeRfc3986(queryParams[k])}`)
              .join('&');
            const canonicalHeaders = `host:${host}\n`;
            const payloadHash = 'UNSIGNED-PAYLOAD';
            const canonicalRequest = [
              'PUT',
              canonicalUri,
              canonicalQuery,
              canonicalHeaders,
              'host',
              payloadHash,
            ].join('\n');
            const stringToSign = [
              'AWS4-HMAC-SHA256',
              amzDate,
              credentialScope,
              sha256Hex(canonicalRequest),
            ].join('\n');
            const signingKey = getSignatureKey(secretAccessKey, dateStamp, region, service);
            const signature = crypto
              .createHmac('sha256', signingKey)
              .update(stringToSign)
              .digest('hex');

            return `https://${host}${canonicalUri}?${canonicalQuery}&X-Amz-Signature=${signature}`;
          }

          async function rpcRequest(method, params) {
            const res = await fetch(SOLANA_RPC_URL, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params: params || [] }),
            });
            if (!res.ok) throw new Error(`RPC ${method} failed with ${res.status}`);
            const data = await res.json();
            if (data?.error) throw new Error(`RPC ${method} error: ${JSON.stringify(data.error)}`);
            return data.result;
          }

          async function validateChainAnchor(payload) {
            const slot = Number(payload.slot);
            if (!Number.isInteger(slot) || slot <= 0) throw new Error('Invalid integrity slot');
            const blockhash = String(payload.blockhash || '');
            if (!blockhash) throw new Error('Missing integrity blockhash');

            const isValid = await rpcRequest('isBlockhashValid', [blockhash, { commitment: 'confirmed' }]);
            if (!isValid?.value) throw new Error('Integrity blockhash is not valid on selected cluster');

            const block = await rpcRequest('getBlock', [
              slot,
              {
                commitment: 'confirmed',
                transactionDetails: 'none',
                rewards: false,
                maxSupportedTransactionVersion: 0,
              },
            ]);
            if (!block || block.blockhash !== blockhash) throw new Error('Integrity slot/blockhash mismatch');

            const blockTimeSec = Number(block.blockTime);
            if (!Number.isFinite(blockTimeSec)) throw new Error('Unable to resolve integrity block time');
            const timestampSec = Number(payload.timestampSec);
            if (!Number.isInteger(timestampSec) || timestampSec <= 0) throw new Error('Invalid integrity timestampSec');
            if (Math.abs(blockTimeSec - timestampSec) > 120) throw new Error('Integrity timestamp does not match block time');
            if (Math.abs(Date.now() - blockTimeSec * 1000) > 10 * 60 * 1000) {
              throw new Error('Integrity block time outside 10 minute window');
            }
          }

          function ensureFreshNonce(nonce) {
            const now = Date.now();
            for (const [k, seenAt] of nonceCache.entries()) {
              if (now - seenAt > NONCE_TTL_MS) nonceCache.delete(k);
            }
            if (nonceCache.has(nonce)) throw new Error('Integrity nonce already used');
            nonceCache.set(nonce, now);
          }

          function verifySignature(payload, signatureBase64) {
            const pubkey = decodeBase58(String(payload.wallet));
            if (pubkey.length !== 32) throw new Error('Invalid wallet public key');
            const signature = Buffer.from(String(signatureBase64), 'base64');
            const spkiPrefix = Buffer.from('302a300506032b6570032100', 'hex');
            const spkiDer = Buffer.concat([spkiPrefix, pubkey]);
            const message = Buffer.from(canonicalizeIntegrityPayload(payload), 'utf8');
            const ok = crypto.verify(null, message, { key: spkiDer, format: 'der', type: 'spki' }, signature);
            if (!ok) throw new Error('Integrity signature verification failed');
          }

          function loadAttestationSigner() {
            if (!ATTESTATION_PRIVATE_KEY_B58) {
              throw new Error('ATTESTATION_PRIVATE_KEY_B58 is required');
            }
            const raw = decodeBase58(ATTESTATION_PRIVATE_KEY_B58);
            const seed = raw.length === 64 ? raw.subarray(0, 32) : raw;
            if (seed.length !== 32) {
              throw new Error('ATTESTATION_PRIVATE_KEY_B58 must decode to 32-byte seed or 64-byte secret key');
            }
            const pkcs8Prefix = Buffer.from('302e020100300506032b657004220420', 'hex');
            const privateKeyDer = Buffer.concat([pkcs8Prefix, seed]);
            const privateKey = crypto.createPrivateKey({ key: privateKeyDer, format: 'der', type: 'pkcs8' });
            const publicKeyDer = crypto.createPublicKey(privateKey).export({ format: 'der', type: 'spki' });
            const derivedPublicKey = Buffer.from(publicKeyDer).subarray(-32);
            const configuredPublicKey = decodeBase58(ATTESTATION_PUBLIC_KEY);
            if (!derivedPublicKey.equals(configuredPublicKey)) {
              throw new Error('ATTESTATION_PUBLIC_KEY does not match ATTESTATION_PRIVATE_KEY_B58');
            }
            return privateKey;
          }

          function buildAttestationMessage(payload) {
            const wallet = decodeBase58(String(payload.wallet || ''));
            if (wallet.length !== 32) throw new Error('Invalid wallet in integrity payload');
            const hashHex = String(payload.hashHex || '').toLowerCase();
            if (!/^[0-9a-f]{64}$/.test(hashHex)) throw new Error('Invalid hashHex in integrity payload');
            const hash = Buffer.from(hashHex, 'hex');
            const nonce = parseNonceU64(payload.nonce);
            const timestampSec = parseIntField('timestampSec', payload.timestampSec);
            const { value: h3CellU64 } = parseAndValidateH3Cell(payload.h3Cell);
            parseOptionalResolution(payload.h3Resolution);

            const out = Buffer.alloc(26 + 32 + 32 + 8 + 8 + 8);
            let o = 0;
            Buffer.from('photo-proof-attestation-v1', 'utf8').copy(out, o);
            o += 26;
            wallet.copy(out, o);
            o += 32;
            hash.copy(out, o);
            o += 32;
            out.writeBigUInt64LE(nonce, o);
            o += 8;
            out.writeBigInt64LE(BigInt(timestampSec), o);
            o += 8;
            out.writeBigUInt64LE(h3CellU64, o);
            return out;
          }

          const attestationSigner = loadAttestationSigner();

          exports.handler = async (event) => {
            const method = event?.requestContext?.http?.method;
            if (method === 'OPTIONS') {
              return response(200, { ok: true });
            }

            try {
              const bodyString = event?.isBase64Encoded
                ? Buffer.from(event.body || '', 'base64').toString('utf8')
                : (event?.body || '{}');
              const data = JSON.parse(bodyString);
              const key = data?.key;
              const contentType = data?.contentType || 'application/octet-stream';
              const integrity = data?.integrity;

              if (!key) return response(400, { error: 'Missing key' });
              if (!integrity || integrity.version !== 'v1' || !integrity.payload || !integrity.signature) {
                return response(400, { error: 'Missing integrity envelope' });
              }

              const payload = integrity.payload;
              const expectedHash = hashFromKey(key);
              const payloadHash = String(payload.hashHex || '').toLowerCase();
              if (!expectedHash || expectedHash !== payloadHash) {
                return response(400, { error: 'Integrity hash does not match key hash' });
              }

              if (!payload.wallet || !payload.nonce) {
                return response(400, { error: 'Missing wallet/nonce in integrity payload' });
              }

              parseAndValidateH3Cell(payload.h3Cell);
              parseOptionalResolution(payload.h3Resolution);
              await validateChainAnchor(payload);
              ensureFreshNonce(String(payload.nonce));
              verifySignature(payload, integrity.signature);
              const attestationSignature = crypto
                .sign(null, buildAttestationMessage(payload), attestationSigner)
                .toString('base64');

              const uploadURL = buildPresignedPutUrl(key, EXPIRES);

              return response(200, {
                uploadURL,
                key,
                integrityAccepted: true,
                attestationSignature,
                attestationPublicKey: ATTESTATION_PUBLIC_KEY,
              });
            } catch (err) {
              return response(400, { error: String(err.message || err) });
            }
          };

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: PresignHttpApi
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: [ !Ref AllowedOrigin ]
        AllowMethods: [ POST, OPTIONS ]
        AllowHeaders: [ '*' ]

  PresignIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PresignFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  PresignRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /uploads
      Target: !Sub integrations/${PresignIntegration}

  PresignPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PresignFunction
      Principal: apigateway.amazonaws.com
      # Allow any stage/method/path on this API to invoke the Lambda
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*

  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

Outputs:
  ApiEndpoint:
    Description: Base URL for the HTTP API
    Value: !GetAtt HttpApi.ApiEndpoint
