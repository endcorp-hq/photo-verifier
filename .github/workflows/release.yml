name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build packages
        run: |
          pnpm --filter @citizen-science-sdk/core build
          pnpm --filter @citizen-science-sdk/blockchain build
          pnpm --filter @citizen-science-sdk/photoverifier-sdk build
      
      - name: Publish core package
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          cd packages/core
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish blockchain package
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          cd packages/blockchain
          npm publish --access restricted --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Publish unified SDK
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          cd packages/photoverifier-sdk
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Build on-chain program
        run: |
          cd on-chain/photo-proof-compressed
          anchor build
      
      - name: Upload on-chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onchain-artifacts
          path: on-chain/**/target/deploy/*.so

  release-anchors:
    name: Release Notes
    runs-on: ubuntu-latest
    needs: release
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: onchain-artifacts
      
      - name: Generate release notes
        run: |
          echo "# Release ${{ github.ref_name }}" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Changes" >> release-notes.md
          git log --pretty=format:"- %s" ${{ github.ref_name }}...HEAD >> release-notes.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: onchain-artifacts/*.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
