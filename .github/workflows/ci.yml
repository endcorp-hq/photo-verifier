name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build packages
        run: |
          pnpm --filter @photoverifier/core build
          pnpm --filter @photoverifier/blockchain build
          pnpm --filter @photoverifier/sdk build
          pnpm --filter @photoverifier/seeker-sdk build

      - name: Run type checks
        run: |
          pnpm --filter @photoverifier/core exec tsc --noEmit
          pnpm --filter @photoverifier/blockchain exec tsc --noEmit
          pnpm --filter @photoverifier/sdk exec tsc --noEmit
          pnpm --filter @photoverifier/seeker-sdk smoke:types
      
      - name: Build mobile app
        run: |
          pnpm -C photo-verifier exec tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run linter
        run: pnpm lint:ts

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: |
          cargo clippy --manifest-path on-chain/photo-proof-compressed/Cargo.toml --all-targets
          cargo clippy --manifest-path on-chain/photo-verifier/Cargo.toml --all-targets

  anchor-test:
    name: Anchor Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL 'https://release.solana.com/v1.18.1/install')"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.31.1
          avm use 0.31.1
      
      - name: Build on-chain program
        run: |
          cd on-chain/photo-proof-compressed
          anchor build

      - name: Run tests
        run: |
          cd on-chain/photo-proof-compressed
          anchor test --skip-build
